# hetzner_token: $HCLOUD_TOKEN
cluster_name: k1
# must be present:
k3s_version: v1.36.2+k3s1	# see: hetzner-k3s releases
config_format_version: 1
kubeconfig_path: ./kubeconfig

create_load_balancer_for_the_kubernetes_api: true
api_server_hostname: api-k1.jwqa.de	# you can point this DNS name to the API load balancer's address
protect_against_deletion: false		# it is sufficient to change it here in the yaml...


networking:
  ssh:
    public_key_path: "~/.ssh/id_ed25519.pub"
    private_key_path: "~/.ssh/id_ed25519"

masters_pool:
  instance_type: cpx22          # see: hcloud server-type list
  instance_count: 3
  locations: [ hel1, hel1, nbg1 ]	# fsn1 today does not want to create any cpx22

worker_node_pools:
  - name: workers
    instance_type: cpx22
    instance_count: 3
    locations:
    - fsn1
    - hel1
    - nbg1

additional_packages:
  - vim screen git

additional_pre_k3s_commands:
  - apt update
  - apt upgrade -y

addons:
  metrics_server:
    enabled: true	# Enables kubectl top commands for viewing resource usage. Disabled by default.

